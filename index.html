<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cyber-Grid: Protocol Cards</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="bootScreen" role="status" aria-live="polite">
    <div class="boot-title">CYBER-GRID: PROTOCOL CARDS</div>
    <div id="bootStatus">Booting module…</div>
  </div>
  <div id="bootError" hidden></div>
  <noscript>
    <div class="noscript">JavaScript is required to run Cyber-Grid: Protocol Cards.</div>
  </noscript>
  <canvas id="game" width="1600" height="900" aria-label="Cyber-Grid Protocol Cards"></canvas>

  <script>
    (function () {
      const errorBox = document.getElementById('bootError');
      const statusBox = document.getElementById('bootStatus');
      const bootScreen = document.getElementById('bootScreen');

      function formatError(error) {
        if (!error) return 'Unknown boot/runtime error.';
        if (error.stack) return error.stack;
        if (error.message) return error.message;
        return String(error);
      }

      window.__cgpcSetBootStatus = function (text) {
        if (statusBox) statusBox.textContent = text;
      };

      window.__cgpcHideBootScreen = function () {
        if (bootScreen) bootScreen.hidden = true;
      };

      window.__cgpcShowBootError = function (error) {
        if (bootScreen) bootScreen.hidden = true;
        if (!errorBox) return;
        errorBox.hidden = false;
        errorBox.textContent = 'BOOT/RUNTIME ERROR\n\n' + formatError(error);
      };

      window.addEventListener('error', function (ev) {
        const target = ev.target;
        if (target && target !== window && target.tagName) {
          window.__cgpcShowBootError('Failed to load resource: <' + target.tagName.toLowerCase() + '> ' + (target.src || target.href || 'unknown path'));
          return;
        }
        window.__cgpcShowBootError(ev.error || ev.message || ev);
      }, true);

      window.addEventListener('unhandledrejection', function (ev) {
        window.__cgpcShowBootError(ev.reason || 'Unhandled promise rejection during boot.');
      });

      window.setTimeout(function () {
        if (!window.__CGPC_MODULE_STARTED__) {
          window.__cgpcShowBootError(
            'js/main.js did not start. This usually means the module path is wrong, the file is missing, or the browser is opening the game from a restricted file:// path. Run it through localhost/Live Server or upload the ZIP as an itch.io HTML5 game.'
          );
        }
      }, 3500);
    }());
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
